name: Create XC Framework and Release PR for Pulse iOS

on:
  workflow_dispatch:

env:
  RELEASE_REPO: dream-horizon-org/pulse-ios

jobs:
  build-and-release:
    name: Build XCFramework & Create Release PR
    runs-on: macos-15

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      # Release version is whatever is in **this** repo’s PulseKit.podspec. Bump it in a commit here before dispatching this workflow; the PR in the release repo will match it.
      - name: Read version from PulseKit.podspec (source repo)
        run: |
          VERSION=$(grep "spec.version" PulseKit.podspec | head -1 | sed "s/.*\"\(.*\)\"/\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "::notice::Release version (from source podspec): $VERSION"

      - name: Check version doesn't already exist in release repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: |
          if gh api repos/${{ env.RELEASE_REPO }}/git/refs/tags/$VERSION 2>/dev/null; then
            echo "::error::Version $VERSION already exists in release repo. Bump spec.version in PulseKit.podspec first."
            exit 1
          fi
          echo "::notice::Version $VERSION is available in release repo."

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Pod install
        run: |
          cd Examples/PulseIOSExample
          pod install
          echo "::notice::Pod install completed"

      - name: Build XCFramework
        run: |
          ./Scripts/build-xcframework.sh
          echo "::notice::XCFramework built successfully"

      - name: Checkout release repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          path: release-repo

      - name: Prepare release branch
        run: |
          set -euo pipefail
          WS="${GITHUB_WORKSPACE}"
          cd "${WS}/release-repo"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="release/${VERSION}"
          git checkout -b "$BRANCH"

          rm -rf PulseKit.xcframework
          cp -R "${WS}/build/PulseKit.xcframework" .

          # Peers: same list as build-xcframework.sh (print-peer-xcframework-entries.rb from PulseKit.podspec).
          while IFS= read -r entry || [[ -n "${entry}" ]]; do
            [[ -z "${entry}" ]] && continue
            name="${entry#*:}"
            rm -rf "${name}.xcframework"
            cp -R "${WS}/build/${name}.xcframework" .
          done < <(ruby "${WS}/Scripts/print-peer-xcframework-entries.rb" "${WS}")
          echo "::notice::Copied PulseKit + all peer xcframeworks from build/"

          sed -i '' "s/spec.version.*=.*/spec.version      = \"${VERSION}\"/" PulseKit.podspec

          PODSPEC_VER=$(grep "spec.version" PulseKit.podspec | head -1 | sed "s/.*\"\(.*\)\"/\1/")
          if [ "${PODSPEC_VER}" != "${VERSION}" ]; then
            echo "::error::PulseKit.podspec spec.version after sed is '${PODSPEC_VER}', expected '${VERSION}'"
            exit 1
          fi
          echo "::notice::Verified release repo PulseKit.podspec spec.version=${VERSION}"

          git add -A
          git commit -m "Release PulseKit v${VERSION}"
          git push origin "$BRANCH"
          echo "::notice::Pushed branch $BRANCH to release repo"

      - name: Create PR in release repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: |
          gh pr create \
            --repo ${{ env.RELEASE_REPO }} \
            --base main \
            --head "release/${VERSION}" \
            --title "Release PulseKit v${VERSION}" \
            --body "$(cat <<EOF
          ## Release PulseKit v${VERSION}

          ### What this PR contains
          - Copies **\`PulseKit.xcframework\`** and peer **\`*.xcframework\`** trees from the SDK build
          - Sets **\`PulseKit.podspec\` → \`spec.version\`** to \`${VERSION}\`

          ### Reviewer checklist
          - [ ] If upstream added or changed CocoaPods deps, align **\`spec.dependency\`** in **\`PulseKit.podspec\`**
          - [ ] If peers changed, align **\`Package.swift\`** **\`.binaryTarget\`** list and **\`PulseKitWrapper\`** dependencies

          ### On merge, the publish workflow will:
          1. Create git tag \`${VERSION}\`
          2. Create GitHub Release (notes only — artifacts live in the repo at the tag)
          3. Publish to CocoaPods trunk
          EOF
          )"
          echo "::notice::Created PR in release repo"

      - name: Summary
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Repo | [${{ env.RELEASE_REPO }}](https://github.com/${{ env.RELEASE_REPO }}) |" >> $GITHUB_STEP_SUMMARY
