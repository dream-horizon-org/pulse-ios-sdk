name: Build and Test

on: 
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Check if the workflow should run
        id: check
        run: |
          # Match repo layout: Swift uses Sources/Tests/; tooling uses Scripts/ (capital S); CI/examples/pod surface area.
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
          if git rev-parse "origin/${BASE_REF}" >/dev/null 2>&1; then
            RANGE="origin/${BASE_REF}...HEAD"
          else
            git fetch origin "${BASE_REF}" --depth=256 2>/dev/null || true
            RANGE="origin/${BASE_REF}...HEAD"
          fi
          if git diff --name-only ${RANGE} 2>/dev/null | grep -qE "^(Sources/|Tests/|scripts/|Scripts/|Examples/|\.github/workflows/|Makefile|Package\.swift|.*\.podspec)"; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi
  
  UnitTests:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: 16.4
      - name: Run unit tests
        run: swift test
  
  SwiftLint:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: GitHub Action for SwiftLint (Only files changed in the PR)
        uses: norio-nomura/action-swiftlint@9f4dcd7fd46b4e75d7935cf2f4df406d5cae3684 # 3.2.1
        env:
          args: --strict
          DIFF_BASE: ${{ github.base_ref }}
  
  iOS:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: 16.4
    - name: Install Homebrew kegs
      run: make setup-brew
    - name: Build for iOS
      run: make build-for-testing-ios
    - name: Test for iOS
      run: make test-without-building-ios
  
  ExampleApp:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: 16.4
    - name: Install CocoaPods
      run: gem install cocoapods
    - name: Pod install
      working-directory: Examples/PulseIOSExample
      run: pod install
    - name: Build Example App
      working-directory: Examples/PulseIOSExample
      run: |
        set -o pipefail
        xcodebuild \
          -workspace PulseIOSExample.xcworkspace \
          -scheme PulseIOSExample \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 16,arch=arm64' \
          -derivedDataPath ./build \
          build
  
  XCFramework:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: 16.4
    - name: Install CocoaPods
      run: gem install cocoapods
    - name: Pod install
      working-directory: Examples/PulseIOSExample
      run: pod install
    - name: Build XCFramework
      run: |
        chmod +x Scripts/build-xcframework.sh
        ./Scripts/build-xcframework.sh
    - name: Verify XCFramework output
      run: |
        for fw in PulseKit KSCrash OpenTelemetryApi OpenTelemetrySdk SwiftProtobuf libwebp; do
          if [ ! -d "build/${fw}.xcframework" ]; then
            echo "::error::build/${fw}.xcframework was not created"
            exit 1
          fi
        done
        echo "PulseKit.xcframework size: $(du -sh build/PulseKit.xcframework | cut -f1)"
        echo "Architectures:"
        find build/PulseKit.xcframework -name "PulseKit" -type f | while read f; do
          echo "  $f: $(file "$f" | sed 's/.*: //')"
        done
    - name: Test XCFramework with Example App
      run: |
        set -euo pipefail
        # Same peer set as pulse-ios-sdk-release / consumer PulseKit.podspec (build/ paths)
        for fw in PulseKit KSCrash OpenTelemetryApi OpenTelemetrySdk SwiftProtobuf libwebp; do
          if [ ! -d "build/${fw}.xcframework" ]; then
            echo "::error::Missing build/${fw}.xcframework (run build-xcframework.sh first)"
            exit 1
          fi
        done

        # Swap podspec to consumer-style: all vendored xcframeworks, no source/trunk deps
        ruby <<'RUBY'
        path = "PulseKit.podspec"
        text = File.read(path)

        def strip_spec_array_attr(text, attr)
          lines = text.lines
          out = []
          i = 0
          re_start = /^  spec\.#{Regexp.escape(attr)} = \[$/
          re_close = /^  \]\s*$/
          while i < lines.size
            if lines[i].match?(re_start)
              i += 1
              while i < lines.size && !lines[i].match?(re_close)
                i += 1
              end
              i += 1 if i < lines.size
              next
            end
            out << lines[i]
            i += 1
          end
          out.join
        end

        text = strip_spec_array_attr(text, "source_files")
        text = strip_spec_array_attr(text, "exclude_files")
        text.gsub!(/^  spec\.dependency .+\n/, "")
        # Single-line only — do not use /m here; .+ would swallow the rest of the file including `end`
        text.sub!(/^  spec\.pod_target_xcconfig = [^\n]+\n/, "")

        vendored = [
          "  spec.vendored_frameworks = [",
          '    "build/PulseKit.xcframework",',
          '    "build/KSCrash.xcframework",',
          '    "build/OpenTelemetryApi.xcframework",',
          '    "build/OpenTelemetrySdk.xcframework",',
          '    "build/SwiftProtobuf.xcframework",',
          '    "build/libwebp.xcframework",',
          "  ]",
          "",
        ].join("\n")

        marker = "  spec.module_name = \"PulseKit\"\n\n"
        abort "PulseKit.podspec: missing module_name anchor" unless text.include?(marker)
        abort "PulseKit.podspec: already has vendored_frameworks" if text.include?("spec.vendored_frameworks")
        text.sub!(marker, marker + vendored)

        File.write(path, text)
        RUBY

        echo "::group::Modified PulseKit.podspec"
        cat PulseKit.podspec
        echo "::endgroup::"

        cd Examples/PulseIOSExample
        pod install

        set -o pipefail
        xcodebuild \
          -workspace PulseIOSExample.xcworkspace \
          -scheme PulseIOSExample \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          build

  required-status-checks:
    needs: 
      - SwiftLint
      - UnitTests
      - iOS
      - ExampleApp
      - XCFramework
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if all required jobs passed
        run: |
          if [[ ${{ needs.SwiftLint.result }} == 'failure' || \
          ${{ needs.UnitTests.result }} == 'failure' || \
          ${{ needs.iOS.result }} == 'failure' || \
          ${{ needs.ExampleApp.result }} == 'failure' || \
          ${{ needs.XCFramework.result }} == 'failure' ]]; then
            echo "One or more required jobs failed. Failing the workflow."
            exit 1
          else
            echo "All required jobs passed/skipped."
          fi
