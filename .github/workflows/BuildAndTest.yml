name: Build and Test

on: 
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Check if the workflow should run
        id: check
        run: |
          git diff --name-only origin/${{ github.base_ref }} HEAD | grep -qE "^(Sources/|Tests/|scripts/)" && echo "should-run=true" >> "$GITHUB_OUTPUT" || echo "should-run=false" >> "$GITHUB_OUTPUT"
  
  UnitTests:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: 16.4
      - name: Run unit tests
        run: swift test
  
  SwiftLint:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: GitHub Action for SwiftLint (Only files changed in the PR)
        uses: norio-nomura/action-swiftlint@9f4dcd7fd46b4e75d7935cf2f4df406d5cae3684 # 3.2.1
        env:
          args: --strict
          DIFF_BASE: ${{ github.base_ref }}
  
  iOS:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: 16.4
    - name: Install Homebrew kegs
      run: make setup-brew
    - name: Build for iOS
      run: make build-for-testing-ios
    - name: Test for iOS
      run: make test-without-building-ios
  
  ExampleApp:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: 16.4
    - name: Install CocoaPods
      run: gem install cocoapods
    - name: Pod install
      working-directory: Examples/PulseIOSExample
      run: pod install
    - name: Build Example App
      working-directory: Examples/PulseIOSExample
      run: |
        set -o pipefail
        xcodebuild \
          -workspace PulseIOSExample.xcworkspace \
          -scheme PulseIOSExample \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 16,arch=arm64' \
          -derivedDataPath ./build \
          build
  
  XCFramework:
    needs: should-run
    if: ${{ needs.should-run.outputs.should-run == 'true' }}
    runs-on: macos-15
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: 16.4
    - name: Install CocoaPods
      run: gem install cocoapods
    - name: Pod install
      working-directory: Examples/PulseIOSExample
      run: pod install
    - name: Build XCFramework
      run: |
        chmod +x scripts/build-xcframework.sh
        ./scripts/build-xcframework.sh
    - name: Verify XCFramework output
      run: |
        if [ ! -d "build/PulseKit.xcframework" ]; then
          echo "::error::PulseKit.xcframework was not created"
          exit 1
        fi
        echo "XCFramework size: $(du -sh build/PulseKit.xcframework | cut -f1)"
        echo "Architectures:"
        find build/PulseKit.xcframework -name "PulseKit" -type f | while read f; do
          echo "  $f: $(file "$f" | sed 's/.*: //')"
        done
    - name: Test XCFramework with Example App
      run: |
        # Swap podspec to use vendored framework instead of source files
        sed -i '' '/spec.source_files/,/\]/d' PulseKit.podspec
        sed -i '' '/spec.exclude_files/,/\]/d' PulseKit.podspec
        sed -i '' '/spec.pod_target_xcconfig/d' PulseKit.podspec
        sed -i '' '/spec.ios.deployment_target/a\
          spec.vendored_frameworks = "build/PulseKit.xcframework"' PulseKit.podspec

        cd Examples/PulseIOSExample
        pod install

        set -o pipefail
        xcodebuild \
          -workspace PulseIOSExample.xcworkspace \
          -scheme PulseIOSExample \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          build

  required-status-checks:
    needs: 
      - SwiftLint
      - UnitTests
      - iOS
      - ExampleApp
      - XCFramework
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if all required jobs passed
        run: |
          if [[ ${{ needs.SwiftLint.result }} == 'failure' || \
          ${{ needs.UnitTests.result }} == 'failure' || \
          ${{ needs.iOS.result }} == 'failure' || \
          ${{ needs.ExampleApp.result }} == 'failure' || \
          ${{ needs.XCFramework.result }} == 'failure' ]]; then
            echo "One or more required jobs failed. Failing the workflow."
            exit 1
          else
            echo "All required jobs passed/skipped."
          fi
